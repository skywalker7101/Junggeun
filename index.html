<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 추천</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>로또 번호 추천</h1>
    <p>버튼을 눌러 오늘의 행운 번호를 받아보세요.</p>

    <div class="card">
      <div class="options">
        <label for="count">추천 개수:</label>
        <select id="count">
          <option value="1">1세트</option>
          <option value="2">2세트</option>
          <option value="3">3세트</option>
          <option value="4">4세트</option>
        </select>
      </div>

      <button id="generateBtn">번호 추천 받기</button>

      <div id="result" class="result"></div>
      <p class="hint">※ 추천 결과는 재미를 위한 번호입니다. 실제 구매 시 주의하세요.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
