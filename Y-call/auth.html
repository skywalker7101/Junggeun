<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 / 회원가입 - Y-Call</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--gray-50); }
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-container { display: grid; grid-template-columns: 1fr 1fr; max-width: 960px; width: 100%; background: white; border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-xl); }
    .auth-left { background: linear-gradient(135deg, #4C1D95, #7C3AED); padding: 60px 40px; display: flex; flex-direction: column; justify-content: center; color: white; }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
    .auth-logo-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.2); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .auth-logo-text { font-size: 1.75rem; font-weight: 800; }
    .auth-left h2 { font-size: 1.875rem; font-weight: 800; line-height: 1.3; margin-bottom: 16px; }
    .auth-left p { font-size: 1rem; color: rgba(255,255,255,0.8); line-height: 1.8; margin-bottom: 36px; }
    .auth-features { display: flex; flex-direction: column; gap: 14px; }
    .auth-feature { display: flex; align-items: center; gap: 12px; font-size: 0.9375rem; }
    .auth-feature-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

    .auth-right { padding: 48px 40px; display: flex; flex-direction: column; }
    .auth-tabs { display: flex; border-bottom: 2px solid var(--gray-200); margin-bottom: 28px; }
    .auth-tab { flex: 1; text-align: center; padding: 14px; font-size: 1rem; font-weight: 600; color: var(--gray-400); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); }
    .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form.hidden { display: none; }

    .social-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
    .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 0.9375rem; font-weight: 600; cursor: pointer; transition: var(--transition); background: white; font-family: inherit; }
    .social-btn:hover { background: var(--gray-50); border-color: var(--gray-400); }

    .divider-text { display: flex; align-items: center; gap: 12px; font-size: 0.875rem; color: var(--gray-400); }
    .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }

    .terms-text { font-size: 0.8125rem; color: var(--gray-400); text-align: center; line-height: 1.6; }
    .terms-text a { color: var(--primary); text-decoration: underline; }
    .input-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray-400); font-size: 1.1rem; }

    .err-msg { font-size: 0.8125rem; color: var(--red); background: var(--red-100); padding: 10px 14px; border-radius: var(--radius-sm); display: none; }
    .err-msg.show { display: block; }

    @media (max-width: 640px) { .auth-container { grid-template-columns: 1fr; } .auth-left { display: none; } }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-left">
        <div class="auth-logo">
          <div class="auth-logo-icon">📞</div>
          <span class="auth-logo-text">Y-Call</span>
        </div>
        <h2>전문가와 바로<br>연결되세요</h2>
        <p>1,800명 이상의 검증된 전문가와<br>분당 단위로 간편하게 상담하세요</p>
        <div class="auth-features">
          <div class="auth-feature"><div class="auth-feature-icon">⚡</div><span>평균 2분 이내 연결</span></div>
          <div class="auth-feature"><div class="auth-feature-icon">✅</div><span>검증된 전문가 인증 시스템</span></div>
          <div class="auth-feature"><div class="auth-feature-icon">🔒</div><span>안전한 결제 및 개인정보 보호</span></div>
          <div class="auth-feature"><div class="auth-feature-icon">🎁</div><span>첫 가입 시 10분 무료 상담 제공</span></div>
        </div>
      </div>

      <div class="auth-right">
        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
          <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">회원가입</div>
        </div>

        <!-- LOGIN -->
        <div id="form-login" class="auth-form">
          <div class="social-btns">
            <button class="social-btn" onclick="googleLogin()">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
              Google로 로그인
            </button>
          </div>
          <div class="divider-text">또는 이메일로 로그인</div>
          <div class="err-msg" id="login-err"></div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <div class="input-group">
              <span class="input-group-icon">✉️</span>
              <input type="email" class="form-input" id="login-email" placeholder="이메일 주소 입력">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <div class="input-group" style="position:relative;">
              <span class="input-group-icon">🔒</span>
              <input type="password" class="form-input" id="login-pw" placeholder="비밀번호 입력">
              <span class="input-eye" onclick="togglePw('login-pw',this)">👁</span>
            </div>
          </div>
          <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="doLogin()">로그인</button>
          <p style="text-align:center;font-size:0.9375rem;color:var(--gray-500);">
            계정이 없으신가요? <a href="#" style="color:var(--primary);font-weight:600;" onclick="switchTab('signup');return false;">회원가입</a>
          </p>
        </div>

        <!-- SIGNUP -->
        <div id="form-signup" class="auth-form hidden">
          <div class="social-btns">
            <button class="social-btn" onclick="googleLogin()">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
              Google로 시작하기
            </button>
          </div>
          <div class="divider-text">또는 이메일로 가입</div>
          <div class="err-msg" id="signup-err"></div>
          <div class="form-group">
            <label class="form-label">이름 *</label>
            <div class="input-group">
              <span class="input-group-icon">👤</span>
              <input type="text" class="form-input" id="signup-name" placeholder="실명 입력">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">이메일 *</label>
            <div class="input-group">
              <span class="input-group-icon">✉️</span>
              <input type="email" class="form-input" id="signup-email" placeholder="이메일 주소 입력">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">전화번호 *</label>
            <div class="input-group">
              <span class="input-group-icon">📱</span>
              <input type="tel" class="form-input" id="signup-phone" placeholder="010-0000-0000">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호 * <span style="font-size:0.8125rem;color:var(--gray-400);font-weight:400;">(8자 이상)</span></label>
            <div class="input-group" style="position:relative;">
              <span class="input-group-icon">🔒</span>
              <input type="password" class="form-input" id="signup-pw" placeholder="8자 이상 입력">
              <span class="input-eye" onclick="togglePw('signup-pw',this)">👁</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;background:var(--gray-50);border-radius:var(--radius-md);padding:14px;">
            <input type="checkbox" id="agree-terms" style="width:18px;height:18px;margin-top:2px;accent-color:var(--primary);flex-shrink:0;">
            <label for="agree-terms" style="font-size:0.9rem;color:var(--gray-700);line-height:1.6;cursor:pointer;">
              <a href="terms.html" target="_blank" style="color:var(--primary);font-weight:600;">이용약관</a> 및
              <a href="privacy.html" target="_blank" style="color:var(--primary);font-weight:600;">개인정보처리방침</a>에 동의합니다. <span style="color:var(--error);">(필수)</span>
            </label>
          </div>
          <button class="btn btn-primary btn-full btn-lg" id="signup-btn" onclick="doSignup()">무료로 회원가입</button>
          <p style="text-align:center;font-size:0.9375rem;color:var(--gray-500);">
            이미 계정이 있으신가요? <a href="#" style="color:var(--primary);font-weight:600;" onclick="switchTab('login');return false;">로그인</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
  <script>
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.get('tab') === 'signup') switchTab('signup');

    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab==='login');
      document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
      document.getElementById('form-login').classList.toggle('hidden', tab!=='login');
      document.getElementById('form-signup').classList.toggle('hidden', tab!=='signup');
    }

    function togglePw(id, el) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      el.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideErr(id) { document.getElementById(id).classList.remove('show'); }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<div class="spinner" style="margin:0 auto;width:20px;height:20px;border-width:2px;"></div>'
        : (btnId === 'login-btn' ? '로그인' : '무료로 회원가입');
    }

    async function doLogin() {
      hideErr('login-err');
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;
      if (!email || !pw) { showErr('login-err', '이메일과 비밀번호를 입력해주세요.'); return; }
      setLoading('login-btn', true);
      try {
        await fbSignIn(email, pw);
        showToast('로그인 성공! 환영합니다 👋', 'success');
        setTimeout(() => {
          const redirect = sessionStorage.getItem('ycall_redirect');
          sessionStorage.removeItem('ycall_redirect');
          location.href = redirect || 'dashboard-user.html';
        }, 800);
      } catch (e) {
        setLoading('login-btn', false);
        const msg = {
          'auth/user-not-found': '등록되지 않은 이메일입니다.',
          'auth/wrong-password': '비밀번호가 틀렸습니다.',
          'auth/invalid-email': '올바른 이메일 형식이 아닙니다.',
          'auth/too-many-requests': '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.',
          'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
        }[e.code] || '로그인 중 오류가 발생했습니다.';
        showErr('login-err', msg);
      }
    }

    async function doSignup() {
      hideErr('signup-err');
      const name  = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const phone = document.getElementById('signup-phone').value.trim();
      const pw    = document.getElementById('signup-pw').value;
      if (!name || !email || !phone || !pw) { showErr('signup-err', '모든 항목을 입력해주세요.'); return; }
      if (pw.length < 8) { showErr('signup-err', '비밀번호는 8자 이상이어야 합니다.'); return; }
      if (!document.getElementById('agree-terms').checked) { showErr('signup-err', '이용약관 및 개인정보처리방침에 동의해주세요.'); return; }
      setLoading('signup-btn', true);
      try {
        await fbSignUp(email, pw, name, phone);
        showToast('회원가입 성공! 10분 무료 쿠폰 지급 🎁', 'success');
        setTimeout(() => {
          const redirect = sessionStorage.getItem('ycall_redirect');
          sessionStorage.removeItem('ycall_redirect');
          location.href = redirect || 'dashboard-user.html';
        }, 1000);
      } catch (e) {
        setLoading('signup-btn', false);
        const msg = {
          'auth/email-already-in-use': '이미 사용 중인 이메일입니다.',
          'auth/invalid-email': '올바른 이메일 형식이 아닙니다.',
          'auth/weak-password': '비밀번호가 너무 약합니다.',
        }[e.code] || '회원가입 중 오류가 발생했습니다.';
        showErr('signup-err', msg);
      }
    }

    async function googleLogin() {
      try {
        await fbGoogleSignIn();
        showToast('Google 로그인 성공! 👋', 'success');
        setTimeout(() => {
          const redirect = sessionStorage.getItem('ycall_redirect');
          sessionStorage.removeItem('ycall_redirect');
          location.href = redirect || 'dashboard-user.html';
        }, 800);
      } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') showToast('Google 로그인 실패: ' + e.message, 'error');
      }
    }

    ['login-email','login-pw'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
    });
    ['signup-name','signup-email','signup-phone','signup-pw'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => { if (e.key==='Enter') doSignup(); });
    });
  </script>
</body>
</html>
