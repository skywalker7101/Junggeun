<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>?붿긽?듯솕 - Y-Call</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; font-family: 'Noto Sans KR', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .vc-header { background: #1a1a2e; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .vc-logo { color: white; font-size: 1.125rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .vc-logo span { color: #7C3AED; }
    .vc-room-info { color: rgba(255,255,255,0.7); font-size: 0.875rem; text-align: center; }
    .vc-room-label { color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-bottom: 2px; }
    .vc-actions { display: flex; gap: 10px; align-items: center; }
    .vc-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 0.875rem; font-weight: 600; transition: all 0.15s; }
    .vc-btn-danger { background: #EF4444; color: white; }
    .vc-btn-danger:hover { background: #DC2626; }
    .vc-btn-outline { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .vc-btn-outline:hover { background: rgba(255,255,255,0.2); }
    #jitsi-container { flex: 1; width: 100%; }
    .loading-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 16px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #7C3AED; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 1rem; color: rgba(255,255,255,0.7); }
    .error-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 16px; text-align: center; padding: 24px; }
    .error-emoji { font-size: 3rem; }
    .error-title { font-size: 1.25rem; font-weight: 700; }
    .error-desc { color: rgba(255,255,255,0.6); font-size: 0.9375rem; }
  </style>
</head>
<body>
  <div class="vc-header">
    <div class="vc-logo">?벞 <span>Y</span>-Call</div>
    <div class="vc-room-info">
      <div class="vc-room-label">?붿긽?듯솕 吏꾪뻾 以?/div>
      <div id="room-name-display">?곌껐 以?..</div>
    </div>
    <div class="vc-actions">
      <button class="vc-btn vc-btn-outline" onclick="copyRoomLink()">?뵕 留곹겕 蹂듭궗</button>
      <button class="vc-btn vc-btn-danger" onclick="endCall()">?벘 ?듯솕 醫낅즺</button>
    </div>
  </div>

  <div id="jitsi-container">
    <div class="loading-screen" id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">?붿긽?듯솕 ?곌껐 以?..</div>
    </div>
  </div>

  <script src='https://meet.jit.si/external_api.js' onerror="showError()"></script>
  <script>
    const params     = new URLSearchParams(location.search);
    const roomId     = params.get('room');
    const userName   = decodeURIComponent(params.get('name') || '?ъ슜??);
    const returnPage = params.get('from') || 'dashboard-user.html';

    if (!roomId) {
      document.getElementById('jitsi-container').innerHTML = `
        <div class="error-screen">
          <div class="error-emoji">?삎</div>
          <div class="error-title">?섎せ???묎렐?낅땲??/div>
          <div class="error-desc">?붿긽?듯솕 留곹겕媛 ?좏슚?섏? ?딆뒿?덈떎.</div>
          <button class="vc-btn vc-btn-outline" style="margin-top:8px;" onclick="location.href='index.html'">?덉쑝濡?/button>
        </div>`;
    } else {
      document.getElementById('room-name-display').textContent = decodeURIComponent(params.get('expertName') || '?꾨Ц媛 ?곷떞');

      window.addEventListener('load', () => {
        if (typeof JitsiMeetExternalAPI === 'undefined') { showError(); return; }

        document.getElementById('loading-screen').style.display = 'none';

        const api = new JitsiMeetExternalAPI('meet.jit.si', {
          roomName: roomId,
          parentNode: document.getElementById('jitsi-container'),
          width: '100%',
          height: '100%',
          userInfo: { displayName: userName },
          configOverwrite: {
            startWithAudioMuted: false,
            startWithVideoMuted: false,
            prejoinPageEnabled: false,
            disableDeepLinking: true,
          },
          interfaceConfigOverwrite: {
            SHOW_JITSI_WATERMARK: false,
            SHOW_WATERMARK_FOR_GUESTS: false,
            TOOLBAR_BUTTONS: ['microphone','camera','desktop','chat','hangup','tileview','fullscreen','settings'],
          },
          lang: 'ko',
        });

        api.on('readyToClose', () => endCall());
        api.on('videoConferenceLeft', () => endCall());
      });
    }

    function showError() {
      document.getElementById('jitsi-container').innerHTML = `
        <div class="error-screen">
          <div class="error-emoji">?좑툘</div>
          <div class="error-title">?붿긽?듯솕 ?곌껐 ?ㅽ뙣</div>
          <div class="error-desc">?ㅽ듃?뚰겕 臾몄젣 ?먮뒗 諛⑺솕踰쎌쑝濡??명빐 ?곌껐?섏? 紐삵뻽?듬땲??<br>?좎떆 ???ㅼ떆 ?쒕룄?댁＜?몄슂.</div>
          <button class="vc-btn vc-btn-outline" style="margin-top:16px;" onclick="location.reload()">?ㅼ떆 ?쒕룄</button>
        </div>`;
    }

    function endCall() {
      if (confirm('?듯솕瑜?醫낅즺?섏떆寃좎뒿?덇퉴?')) location.href = returnPage;
    }

    function copyRoomLink() {
      const link = location.href;
      navigator.clipboard.writeText(link).then(() => {
        alert('留곹겕媛 蹂듭궗?섏뿀?듬땲??\n?곷?諛⑹뿉寃?怨듭쑀?섎㈃ 媛숈씠 李몄뿬?????덉뒿?덈떎.');
      });
    }
  </script>
</body>
</html>
